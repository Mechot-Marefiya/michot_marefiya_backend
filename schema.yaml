      description: Retrieve a paginated list of notifications for the authenticated
        user. Supports filtering by read status, notification type, priority, and
        date range.
      summary: List user notifications
      parameters:
      - in: query
        name: created_after
        schema:
          type: string
          format: date-time
        description: Filter notifications created after this date (ISO 8601 format)
      - in: query
        name: created_before
        schema:
          type: string
          format: date-time
        description: Filter notifications created before this date (ISO 8601 format)
      - in: query
        name: is_read
        schema:
          type: boolean
        description: Filter by read status (true/false)
      - in: query
        name: notification_type
        schema:
          type: string
        description: Filter by notification type (e.g., payment_success, booking_confirmed)
      - in: query
        name: ordering
        schema:
          type: string
        description: 'Sort order: created_at, -created_at (newest first), priority,
          -priority (highest first)'
      - in: query
        name: page
        schema:
          type: integer
        description: Page number for pagination
      - in: query
