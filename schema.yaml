openapi: 3.0.3
info:
  title: Michot Marefiya Backend API
  version: 1.0.0
  description: "\nAPI documentation for the Michot Marefiya platform.\nThis API handles\
    \ accommodations (Hotels, Guest Houses), transport (Car Rentals), \nsecure payments\
    \ via Chapa, and user identity management.\n\n### Authentication\nMost endpoints\
    \ require a JWT Bearer token. \nObtain your token from `/api/v1/auth/token/`.\n\
    \    "
paths:
  /api/v1/account/companies/:
    get:
      operationId: v1_account_companies_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - Identity & Auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCompanyProfileResponseList'
          description: ''
    post:
      operationId: v1_account_companies_create
      tags:
      - Identity & Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyRegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CompanyRegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CompanyRegistrationRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyProfileResponse'
          description: ''
  /api/v1/account/companies/{id}/:
    get:
      operationId: v1_account_companies_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Company Profile.
        required: true
      tags:
      - Identity & Auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyProfileResponse'
          description: ''
    patch:
      operationId: v1_account_companies_partial_update
      parameters:
