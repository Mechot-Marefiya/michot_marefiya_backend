  /api/v1/payment/initiate/:
    post:
      operationId: v1_payment_initiate_create
      description: "\n        Initiates a payment transaction via Chapa for a specific\
        \ booking.\n        The server calculates and locks the exchange rate at the\
        \ moment of initiation \n        to ensure price consistency throughout the\
        \ payment flow.\n        \n        **Access Control**:\n        - **Authenticated**:\
        \ Users can pay for their own bookings.\n        - **Guest**: Public access\
        \ allowed if the booking is a 'Guest Booking' (no registered user).\n    \
        \    "
      summary: Initiate payment for a booking
      tags:
      - Payments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentInitializeRequest'
            examples:
              SuccessfulInitiation:
                value:
                  success: true
                  message: Payment initialized
                  checkout_url: https://checkout.chapa.co/checkout/payment/...
                  tx_ref: marefiya-booking-123-abc
                  calculated_amount: '5000.00'
                  payment_currency: ETB
                  exchange_rate: '1.0'
                  original_amount: '5000.00'
                  original_currency: ETB
                summary: Successful Initiation
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PaymentInitializeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PaymentInitializeRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentInitializeResponse'
              examples:
                SuccessfulInitiation:
                  value:
                    success: true
                    message: Payment initialized
                    checkout_url: https://checkout.chapa.co/checkout/payment/...
                    tx_ref: marefiya-booking-123-abc
                    calculated_amount: '5000.00'
                    payment_currency: ETB
                    exchange_rate: '1.0'
                    original_amount: '5000.00'
                    original_currency: ETB
                  summary: Successful Initiation
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/v1/payment/ledger/:
    get:
      operationId: v1_payment_ledger_list
      description: |-
        API for Owners to view their financial ledger.
        Supports search by tx_ref, booking_reference, customer_name.
        Supports filtering by status and payout_status.
      summary: Get financial summary (Total Revenue)
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: payout_status
        schema:
          type: string
          enum:
          - failed
          - na
          - paid
          - pending
        description: |-
          Status of the vendor payout split

          * `pending` - Pending
          * `paid` - Paid (Split Success)
          * `failed` - Failed (Split Error)
          * `na` - Not Applicable
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - cancelled
          - failed
          - pending
          - success
        description: |-
          * `pending` - Pending
          * `success` - Success
          * `failed` - Failed
          * `cancelled` - Cancelled
      tags:
      - Finance & Ledger
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOwnerPaymentTransactionList'
          description: ''
