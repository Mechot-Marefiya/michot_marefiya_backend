      tags:
      - Identity & Auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                PhoneCooldownError:
                  value:
                    phone:
                    - Phone number can only be changed once every 7 days. Please try
                      again later.
                  summary: Phone cooldown error
                PhoneLimitError:
                  value:
                    phone:
                    - Phone number can only be changed three times. Please contact
                      support if you need help.
                  summary: Phone limit error
          description: ''
