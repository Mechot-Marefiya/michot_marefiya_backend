  /api/v1/account/hotels/{id}/check_availability/:
    get:
      operationId: v1_account_hotels_check_availability_list
      description: |-
        Check room availability for a hotel between check-in and check-out dates.
        Expects check_in_date and check_out_date in the request params.
      parameters:
      - in: query
        name: category
        schema:
          type: string
      - in: query
        name: check_in_date
        schema:
          type: string
        description: Check-in date (YYYY-MM-DD)
      - in: query
        name: check_out_date
        schema:
          type: string
        description: Check-out date (YYYY-MM-DD)
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Hotel Profile.
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
