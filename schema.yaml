      - Identity & Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCompanyProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCompanyProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCompanyProfileRequest'
      security:
