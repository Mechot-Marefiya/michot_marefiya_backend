    OwnerPaymentTransaction:
      type: object
      description: |-
        Serializer for the Owner Dashboard financial ledger.
        Flattens booking information for easier frontend consumption.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        tx_ref:
          type: string
          maxLength: 255
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        currency:
          type: string
          maxLength: 3
        status:
          $ref: '#/components/schemas/PaymentTransactionStatusEnum'
        payment_method:
          type: string
          nullable: true
          maxLength: 100
        receipt_url:
          type: string
          format: uri
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        booking_type:
          allOf:
          - $ref: '#/components/schemas/BookingType7c6Enum'
          description: |-
            Discriminator for the type of booking

            * `booking` - Hotel Room
            * `guesthouse` - Guesthouse
            * `eventspace` - Event Space
            * `carrental` - Car Rental
            * `carrental_extension` - Car Rental Extension
            * `propertyrental` - Property Rental
            * `contact_reveal` - Contact Reveal
        booking_reference:
          type: string
          readOnly: true
        listing_title:
          type: string
          readOnly: true
        customer_name:
          type: string
          readOnly: true
        booking_dates:
          type: object
          additionalProperties: {}
          readOnly: true
        owner_price:
          type: string
          readOnly: true
        service_fee:
          type: string
          readOnly: true
        tax_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          nullable: true
          description: Tax amount collected for eligible property rental transactions
        tax_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,4})?$
          nullable: true
          description: Tax rate used for eligible property rental transactions
        grand_total:
          type: string
          readOnly: true
        tax_liability_status:
          nullable: true
          description: |-
            Tax applicability status for this transaction

            * `applicable` - Applicable
            * `not_applicable` - Not Applicable
          oneOf:
          - $ref: '#/components/schemas/TaxLiabilityStatusEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        commission_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,4})?$
          nullable: true
          description: The rate used for this transaction (e.g. 0.05)
        commission_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          nullable: true
          description: Amount taken as platform fee
        vendor_payout_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          nullable: true
          description: Amount sent to the vendor subaccount
        payout_status:
          allOf:
          - $ref: '#/components/schemas/PayoutStatusEnum'
          description: |-
            Status of the vendor payout split

            * `pending` - Pending
            * `paid` - Paid (Split Success)
            * `failed` - Failed (Split Error)
            * `na` - Not Applicable
      required:
      - amount
      - booking_dates
      - booking_reference
      - created_at
      - customer_name
      - grand_total
      - id
      - listing_title
      - owner_price
      - receipt_url
      - service_fee
      - tx_ref
    OwnerTypeEnum:
      enum:
      - company
      - individual_owner
      type: string
      description: |-
        * `company` - company
        * `individual_owner` - individual_owner
