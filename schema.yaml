components:
  schemas:
    AcceptedTermsSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        scope_type:
          type: string
          nullable: true
        scope_id:
          type: string
          format: uuid
          nullable: true
        version:
          type: string
        terms_url:
          type: string
          nullable: true
      required:
      - version
    ActiveListingMetric:
      type: object
      properties:
        category:
          type: string
        count:
          type: integer
      required:
      - category
      - count
    AddonCategoryEnum:
      enum:
      - meal
      - transport
      - service
      - amenity
      type: string
      description: |-
        * `meal` - Meal/Food
        * `transport` - Transportation
        * `service` - Service
        * `amenity` - Amenity/Equipment
    AddonOffering:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        hotel:
          type: string
          format: uuid
          description: The hotel that provides this addon
        name:
          type: string
          title: Addon Name
          description: e.g., 'Breakfast Buffet', 'Airport Shuttle'
          maxLength: 100
        description:
          type: string
          description: Detailed description of the addon service
        category:
          $ref: '#/components/schemas/AddonCategoryEnum'
        price_per_unit:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          description: Base price for one unit of this addon
        currency:
          type: string
          description: ISO 4217 currency code
          maxLength: 3
        pricing_type:
          allOf:
          - $ref: '#/components/schemas/PricingTypeEnum'
          description: |-
            How this addon is priced

            * `per_person` - Per Person
            * `per_night` - Per Night
            * `per_booking` - Per Booking (One-time)
            * `per_unit` - Per Unit
        is_active:
          type: boolean
          title: Active
          description: Whether this addon is currently available for booking
        max_quantity_per_booking:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
          description: Maximum number of units per booking (null = unlimited)
        requires_inventory:
          type: boolean
          description: Whether this addon has limited daily inventory
        daily_capacity:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
          description: Total available units per day (if inventory tracked)
        icon:
          type: string
          description: Icon identifier for frontend (e.g., 'breakfast', 'shuttle')
          maxLength: 50
        display_order:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Order in which addon appears in lists (lower numbers first)
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        conversion:
          allOf:
          - $ref: '#/components/schemas/CurrencyConversionMetadata'
          readOnly: true
          description: Metadata about currency conversion if requested
      required:
      - conversion
      - created_at
      - hotel
      - id
      - name
      - price_per_unit
      - updated_at
