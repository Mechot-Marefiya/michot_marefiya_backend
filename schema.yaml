        \ `guest_last_name` are required.\n        - Guest checkout now requires a\
        \ prior `guest-otp/request/` call and both `otp_challenge_id` and `otp_code`\
        \ on create.\n        - `terms_accepted` must be true.\n        - `terms_version`\
        \ must match the hotel's latest active T&C version.\n        - Returns a pending\
        \ booking with a human-readable `booking_reference` (e.g., H-X7Y2Z9).\n  \
        \      "
