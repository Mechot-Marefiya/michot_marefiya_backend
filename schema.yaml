      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyProfileResponse'
          description: ''
    delete:
      operationId: v1_account_companies_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Company Profile.
        required: true
      tags:
      - Identity & Auth
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
