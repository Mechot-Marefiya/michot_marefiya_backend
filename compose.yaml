services:
  db:
    image: postgres:18.0
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - marefiya_pgdata_dev:/var/lib/postgresql

  redis:
    image: redis:7-alpine
    container_name: marefiya_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - marefiya_redis_data:/data

  pgadmin4:
    image: dpage/pgadmin4
    ports:
      - 8001:80
    env_file:
      - .env
    volumes:
      - marefiya_pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: ./docker/dev/Dockerfile
      args:
        USER_ID: ${UID}
        GROUP_ID: ${GID}
    image: marefiya:dev
    ports:
      - 8000:8000
    volumes:
      - ./:/usr/src/app
      - marefiya_pytest_cache:/tmp/pytest_cache
      - marefiya_pycache:/tmp/pycache
    user: "${UID}:${GID}"
    command: python manage.py runserver 0.0.0.0:8000
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery:
    build:
      context: .
      dockerfile: ./docker/dev/Dockerfile  # ← fix: use dev, not prod
      args:
        USER_ID: ${UID}
        GROUP_ID: ${GID}
    image: marefiya:dev
    command: celery -A config.celery worker -l info
    volumes:
      - ./:/usr/src/app
    user: "${UID}:${GID}"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy  # ← fix: wait for db too, not just redis
      redis:
        condition: service_started
      api:
        condition: service_started

  celery-beat:
    build:
      context: .
      dockerfile: ./docker/dev/Dockerfile  # ← fix: use dev, not prod
    command: celery -A config.celery beat -l info
    volumes:
      - ./:/usr/src/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy  # ← fix: wait for db
      redis:
        condition: service_started
      api:
        condition: service_started

volumes:
  marefiya_pgdata_dev:
  marefiya_pgadmin_data:
  marefiya_redis_data:
  marefiya_pytest_cache:
  marefiya_pycache:
