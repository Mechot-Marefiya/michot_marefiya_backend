name: Weekly Activity Report

on:
  schedule:
    # Every Friday at 18:00 UTC
    - cron: '0 18 * * 5'
  workflow_dispatch:
    # Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub requests

      - name: Run report script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Replace with your actual project number if using Projects V2
          PROJECT_NUMBER: "1" 
        run: python scripts/gh_report.py

      - name: Create GitHub Issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT_TITLE="📊 Weekly Status Report: $(date +'%Y-%m-%d')"
          REPORT_BODY=$(cat weekly_report.md)
          # Use the GitHub CLI to create the issue in the backend repo
          gh issue create --title "$REPORT_TITLE" --body "$REPORT_BODY" --repo Michot-IT-Solutions/michot_marefiya_backend
