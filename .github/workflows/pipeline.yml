name: PIPELINE

on:
  push:
    branches:
      - main
      - development
      - "feat/**"
      - "fix/**"

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: ci-secret-key-for-production-checks-0123456789-abcdef
      DEBUG: "False"
      DATABASE_URL: sqlite:////tmp/marefiya-ci.sqlite3
      REDIS_URL: redis://localhost:6379/1
      CELERY_BROKER_URL: redis://localhost:6379/0
      CHAPA_SECRET_KEY: ci-chapa-secret
      CHAPA_WEBHOOK_SECRET: ci-chapa-webhook-secret
      CHAPA_CALLBACK_URL: https://example.com/api/v1/payment/callback/chapa/
      FRONTEND_URL: http://localhost:5173
      MAP_PROVIDER: geoapify
      GEOAPIFY_API_KEY: ci-geoapify-key
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.txt -r requirements/prod.txt

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Django checks
        run: |
          python manage.py check --settings=config.settings.test
          python manage.py check --deploy --settings=config.settings.prod

      - name: Test
        run: pytest -q --maxfail=1

  docker_build:
    runs-on: ubuntu-latest
    needs: build_and_test
    if: github.ref == 'refs/heads/development' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - uses: docker/setup-buildx-action@v2
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/prod/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/michot_marefiya_backend:${{ github.ref_name }}
            ${{ secrets.DOCKER_USERNAME }}/michot_marefiya_backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker_build
    if: |
      (github.ref == 'refs/heads/development' || github.ref == 'refs/heads/main')
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            if [ "${{ github.ref_name }}" = "main" ]; then
              # --- PRODUCTION CONFIG ---
              PROJECT_DIR="/root/michot_marefiya_backend"
              COMPOSE_FILE="compose.prod.yaml"
              PROJECT_NAME="michot_prod"
              API_CONTAINER="michot-api-prod"
              HEALTH_URL="https://michotmarefia.com/healthz"
            else
              # --- STAGING CONFIG ---
              PROJECT_DIR="/root/michot_staging_backend"
              COMPOSE_FILE="compose.prod.yaml"
              PROJECT_NAME="michot_staging"
              API_CONTAINER="michot-api-staging"
              HEALTH_URL="https://staging.michotmarefia.com/healthz"
            fi

            echo "🚀 Starting Deployment for branch: ${{ github.ref_name }}"
            cd $PROJECT_DIR || exit 1
            
            git pull origin ${{ github.ref_name }}
            
            echo "🧹 Cleaning up old containers..."
            docker compose -p $PROJECT_NAME -f $COMPOSE_FILE down --remove-orphans
            
            echo "🏗️ Building and starting new containers..."
            docker compose -p $PROJECT_NAME -f $COMPOSE_FILE up -d --build
            
            echo "⏳ Waiting for database (20s)..."
            sleep 20
            
            # --- DJANGO TASKS ---
            # Using --fake-initial ensures your production data is safe when 
            # you push your new initial migrations from staging.
            echo "Running migrations..."
            docker exec $API_CONTAINER python manage.py migrate --noinput --fake-initial || docker exec $API_CONTAINER python manage.py migrate --noinput
            
            echo "Collecting static files..."
            docker exec $API_CONTAINER python manage.py collectstatic --noinput

            # SYNC STATIC FILES TO VAR/WWW (to keep Admin UI working)
            if [ "${{ github.ref_name }}" = "main" ]; then
                mkdir -p /var/www/michot_prod/static/
                docker cp $API_CONTAINER:/usr/src/app/staticfiles/. /var/www/michot_prod/static/
                chown -R www-data:www-data /var/www/michot_prod/static/
            else
                mkdir -p /var/www/michot_staging/static/
                docker cp $API_CONTAINER:/usr/src/app/staticfiles/. /var/www/michot_staging/static/
                chown -R www-data:www-data /var/www/michot_staging/static/
            fi

            echo "🔍 Checking health at $HEALTH_URL"
            sleep 10
            curl -fL $HEALTH_URL || (echo "❌ Health check failed" && exit 1)
            
            echo "✅ Backend Deployment Successful!"
