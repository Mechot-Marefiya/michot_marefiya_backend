    #           tags: |
    #             ${{ secrets.DOCKER_USERNAME }}/michot_marefiya_backend:${{ github.ref_name }}
    #             ${{ secrets.DOCKER_USERNAME }}/michot_marefiya_backend:latest

    deploy:
        runs-on: ubuntu-latest
        # needs: docker_build
        if: github.ref == 'refs/heads/development' || github.ref == 'refs/heads/main'
        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.0.0
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY  }}
                  script: |
                      cd ./michot_marefiya_backend
                      git pull origin ${{ github.ref_name }}
                      docker compose -f compose.prod.yaml pull
                      docker compose -f compose.prod.yaml down
                      docker compose -f compose.prod.yaml up -d --build
                      docker compose exec api python manage.py migrate --noinput
                      sleep 10
                      curl -f https://${{ github.ref == 'refs/heads/main' && 'michotmarefia.com'}}/health || (echo "Deployment failed!" && exit 1)
