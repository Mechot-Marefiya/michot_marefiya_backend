name: PIPELINE

on:
    push:
        branches:
            - main
            - development
            - "feat/**"
            - "fix/**"

jobs:
    build_and_test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.13"

            - name: Install dependencies via uv
              run: |
                  python -m pip install --upgrade pip uv
                  uv sync
                  source .venv/bin/activate
            - name: Install Ruff
              run: python -m pip install ruff

            - name: Apply Linting Fixes
              id: lint_fix
              run: |
                  # ... (Ruff fix logic remains the same)
                  FIXES_APPLIED=$(ruff check . --fix-only --exit-code 0 | wc -l)
                  echo "fixes_applied=$FIXES_APPLIED" >> $GITHUB_OUTPUT

            - name: Check Formatting
              run: ruff format --check .

            - name: Commit Linting Fixes
              if: steps.lint_fix.outputs.fixes_applied > 0
              # 🚨 CHANGE THE ACTION NAME HERE 🚨
              uses: stefanzweifel/git-auto-commit-action@v5
              with:
                commit_message: "style: Apply automated linting fixes from CI"

