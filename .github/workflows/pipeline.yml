name: PIPELINE

on:
    push:
        branches:
            - main
            - development
            - "feat/**"
            - "fix/**"

jobs:
    build_and_test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.13"

            - name: Install dependencies via uv
              run: |
                  python -m pip install --upgrade pip uv
                  uv sync

            - name: Lint & format
              run: |
                  source .venv/bin/activate
                  # || true ensures the pipeline continues even if ruff finds issues
                  ruff check . || true
                  ruff format --check . || true

    docker_build:
        runs-on: ubuntu-latest
        needs: build_and_test
        if: github.ref == 'refs/heads/development' || github.ref == 'refs/heads/main'
        steps:
          - uses: actions/checkout@v3
          - uses: docker/setup-buildx-action@v2
          - uses: docker/login-action@v2
            with:
              username: ${{ secrets.DOCKER_USERNAME }}
              password: ${{ secrets.DOCKER_PASSWORD }}
          - uses: docker/build-push-action@v4
            with:
              context: .
              file: ./Dockerfile
              push: true
              tags: |
                ${{ secrets.DOCKER_USERNAME }}/michot_marefiya_backend:${{ github.ref_name }}
                ${{ secrets.DOCKER_USERNAME }}/michot_marefiya_backend:latest

    deploy:
        runs-on: ubuntu-latest
        if: |
          always() && 
          (github.ref == 'refs/heads/development' || github.ref == 'refs/heads/main')
        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.0.0
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY  }}
                  script: |
                      set -e
                      if [ "${{ github.ref_name }}" = "main" ]; then
                        # --- PRODUCTION CONFIG ---
                        PROJECT_DIR="/root/michot_marefiya_backend"
                        COMPOSE_FILE="compose.prod.yaml"
                        PROJECT_NAME="michot_prod"
                        API_CONTAINER="michot_marefiya_backend-api-1"
                        HEALTH_URL="http://michotmarefia.com/api/admin/login/"
                      else
                        # --- STAGING CONFIG ---
                        PROJECT_DIR="/root/michot_staging_backend"
                        COMPOSE_FILE="docker-compose.staging.yml"
                        PROJECT_NAME="michot_staging"
                        API_CONTAINER="michot-api-staging"
                        HEALTH_URL="https://staging.michotmarefia.com/api/admin/login/"
                      fi

                      echo "🚀 Starting Deployment for branch: ${{ github.ref_name }}"
                      cd $PROJECT_DIR || exit 1
                      
                      # Update code
                      git pull origin ${{ github.ref_name }}
                      
                      # 1. Clean up potential conflicts
                      echo "🧹 Cleaning up old containers and orphans..."
                      docker compose -p $PROJECT_NAME -f $COMPOSE_FILE down --remove-orphans
                      
                      # Specifically force-remove the redis container that caused the previous error
                      echo "🗑️ Ensuring no naming conflicts for redis..."
                      docker rm -f marefiya_redis || true

                      # 2. Rebuild and start
                      echo "🏗️ Building and starting new containers..."
                      docker compose -p $PROJECT_NAME -f $COMPOSE_FILE up -d --build
                      
                      # 3. Django tasks
                      echo "⏳ Waiting for database and containers (20s)..."
                      sleep 20
                      docker exec $API_CONTAINER python manage.py migrate --noinput
                      docker exec $API_CONTAINER python manage.py collectstatic --noinput

                      # 4. Final Health Check
                      echo "🔍 Checking health at $HEALTH_URL"
                      sleep 10
                      curl -fL $HEALTH_URL || (echo "❌ Health check failed at $HEALTH_URL" && exit 1)
                      
                      echo "✅ Backend Deployment Successful!"