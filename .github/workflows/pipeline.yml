name: PIPELINE

on:
    push:
        branches:
            - main
            - development
            - "feat/**"
            - "fix/**"

jobs:
    build_and_test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.13"

            - name: Install dependencies via uv
              run: |
                  python -m pip install --upgrade pip uv
                  uv sync
                  source .venv/bin/activate
            - name: Lint & format
              run: |
                  source .venv/bin/activate
                  ruff check .
                  ruff format --check .

            # - name: Run tests
            #   run: |
            #       source .venv/bin/activate
